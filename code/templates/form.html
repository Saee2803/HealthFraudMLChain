<!DOCTYPE html>
<html>
<head>
    <title>Insurance Fraud Predictor</title>
</head>
<body>
    <h2>Health Insurance Claim Form</h2>
    <form action="/predict" method="post">
        Age: <input type="number" name="age" required><br><br>
        Sex: 
        <select name="sex">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>
        BMI: <input type="text" name="bmi" required><br><br>
        Children: <input type="number" name="children" required><br><br>
        Smoker: 
        <select name="smoker">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select><br><br>
        Region:
        <select name="region">
            <option value="northeast">Northeast</option>
            <option value="northwest">Northwest</option>
            <option value="southeast">Southeast</option>
            <option value="southwest">Southwest</option>
        </select><br><br>
        Charges: <input type="text" name="charges" required><br><br>

        <input type="submit" value="Check Fraud">
    </form>
</body>
</html>
