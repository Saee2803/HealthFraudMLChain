<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Health Insurance Fraud Prediction Result</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoY9F6bU5y0b1p6bZ9ZZTtmI3zV9zzTtmI3zV9zzTtmI3zV9"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      background: linear-gradient(135deg, #a0d8f7 0%, #e0f2fe 100%);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .result-card {
      max-width: 480px;
      width: 100%;
      background: #ffffffcc;
      backdrop-filter: saturate(180%) blur(20px);
      border-radius: 1.25rem;
      box-shadow: 0 20px 40px rgba(0, 123, 255, 0.25);
      padding: 2.5rem 2rem 3rem;
      text-align: center;
      transition: box-shadow 0.3s ease;
    }
    .result-card:hover {
      box-shadow: 0 25px 50px rgba(0, 123, 255, 0.4);
    }

    .result-icon {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 1rem;
      transition: transform 0.3s ease;
    }
    .result-card:hover .result-icon {
      transform: scale(1.1);
    }

    .result-text {
      font-weight: 700;
      font-size: 2.75rem;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      user-select: none;
    }

    .summary-title {
      font-weight: 600;
      font-size: 1.25rem;
      color: #0d6efd;
      border-bottom: 3px solid #0d6efd;
      padding-bottom: 0.25rem;
      margin-bottom: 1.5rem;
      user-select: none;
    }

    .summary-item {
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
      color: #333;
      user-select: text;
    }
    .summary-item strong {
      color: #0d6efd;
    }

    .btn-back {
      margin-top: 2rem;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      user-select: none;
    }
    .btn-back:hover,
    .btn-back:focus {
      background-color: #0a58ca;
      box-shadow: 0 12px 30px rgba(10, 88, 202, 0.5);
      outline: none;
    }

    @media (max-width: 576px) {
      .result-card {
        padding: 2rem 1.5rem 2.5rem;
      }
      .result-icon {
        font-size: 4rem;
      }
      .result-text {
        font-size: 2rem;
      }
      .summary-title {
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
      .summary-item {
        font-size: 1rem;
        margin-bottom: 0.5rem;
      }
      .btn-back {
        font-size: 1rem;
        padding: 0.65rem 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="result-card shadow">
    <div id="predictionResult" class="mb-4 d-flex flex-column align-items-center justify-content-center gap-3">
      <i aria-hidden="true" class="result-icon"></i>
      <span class="result-text"></span>
    </div>
    <div class="text-start">
      <h5 class="summary-title">Claim Summary</h5>
      <p class="summary-item"><strong>Claim ID:</strong> <span id="claimId">-</span></p>
      <p class="summary-item"><strong>Patient Name:</strong> <span id="patientName">-</span></p>
      <p class="summary-item"><strong>Claim Amount:</strong> ₹<span id="claimAmount">-</span></p>
      <p class="summary-item"><strong>Date Submitted:</strong> <span id="dateSubmitted">-</span></p>
    </div>
    <button class="btn btn-primary btn-back w-100" id="backBtn" type="button" aria-label="Back to Dashboard">
      <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </button>
  </div>

  <script>
    // Example data - replace with dynamic data as needed
    const resultData = {
      prediction: "Fraudulent", // or "Genuine"
      claimId: "CLM20240615001",
      patientName: "Jane Doe",
      claimAmount: "75000",
      dateSubmitted: "2024-06-15",
    };

    const predictionResultDiv = document.getElementById("predictionResult");
    const icon = predictionResultDiv.querySelector("i");
    const text = predictionResultDiv.querySelector("span");

    if (resultData.prediction === "Fraudulent") {
      icon.className = "fas fa-exclamation-triangle text-danger result-icon";
      text.textContent = "Fraudulent";
      text.className = "result-text text-danger";
    } else if (resultData.prediction === "Genuine") {
      icon.className = "fas fa-check-circle text-success result-icon";
      text.textContent = "Genuine";
      text.className = "result-text text-success";
    } else {
      icon.className = "";
      text.textContent = "Unknown";
      text.className = "result-text text-secondary";
    }

    document.getElementById("claimId").textContent = resultData.claimId;
    document.getElementById("patientName").textContent = resultData.patientName;
    document.getElementById("claimAmount").textContent = Number(resultData.claimAmount).toLocaleString("en-IN");
    document.getElementById("dateSubmitted").textContent = new Date(resultData.dateSubmitted).toLocaleDateString("en-IN", {
      year: "numeric",
      month: "long",
      day: "numeric",
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "/dashboard";
    });
  </script>
</body>
</html>
