<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-purple-600 to-indigo-500">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Reset Password</h2>

    <form method="POST">
      <div class="mb-4">
        <label class="block font-semibold mb-1">Enter OTP</label>
        <input type="text" name="otp" maxlength="6" required
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400">
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-1">New Password</label>
        <input type="password" name="new_password" required minlength="6"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400">
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" required minlength="6"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400">
      </div>

      <button type="submit"
        class="w-full py-2 bg-purple-600 text-white font-semibold rounded-lg hover:bg-purple-700">
        Reset Password
      </button>
    </form>

    <p class="mt-4 text-center">
      <a href="{{ url_for('login') }}" class="text-indigo-500">Back to Login</a>
    </p>
  </div>
</body>
</html>
