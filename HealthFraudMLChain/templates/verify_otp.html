<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script>
    // Auto-focus for OTP inputs
    function moveNext(event, nextFieldId) {
      if (event.target.value.length >= 1 && nextFieldId) {
        document.getElementById(nextFieldId).focus();
      }
    }
    function movePrev(event, prevFieldId) {
      if (event.key === "Backspace" && prevFieldId && !event.target.value) {
        document.getElementById(prevFieldId).focus();
      }
    }
    function collectOTP() {
      const otp = Array.from(document.querySelectorAll(".otp-input"))
                       .map(input => input.value)
                       .join("");
      document.getElementById("otp_hidden").value = otp;
      return true; // allow form submission
    }
  </script>
</head>
<body class="bg-gradient-to-r from-indigo-100 to-blue-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
    <h2 class="text-3xl font-bold text-indigo-600 mb-6">Enter OTP</h2>
    <p class="text-gray-600 mb-6">Please enter the 6-digit OTP sent to your email</p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="space-y-2 mb-6">
          {% for category, message in messages %}
            <div class="p-3 rounded text-white 
                        {% if category == 'success' %}bg-green-500
                        {% elif category == 'danger' %}bg-red-500
                        {% else %}bg-gray-500{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form action="{{ request.path }}" method="POST" onsubmit="return collectOTP();" class="space-y-6">
      <div class="flex justify-between space-x-2">
        <input type="text" id="otp1" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400" 
               oninput="moveNext(event, 'otp2')" onkeydown="movePrev(event, '')" required>
        <input type="text" id="otp2" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400"
               oninput="moveNext(event, 'otp3')" onkeydown="movePrev(event, 'otp1')" required>
        <input type="text" id="otp3" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400"
               oninput="moveNext(event, 'otp4')" onkeydown="movePrev(event, 'otp2')" required>
        <input type="text" id="otp4" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400"
               oninput="moveNext(event, 'otp5')" onkeydown="movePrev(event, 'otp3')" required>
        <input type="text" id="otp5" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400"
               oninput="moveNext(event, 'otp6')" onkeydown="movePrev(event, 'otp4')" required>
        <input type="text" id="otp6" maxlength="1" class="otp-input w-12 h-12 border rounded-lg text-center text-xl focus:ring-2 focus:ring-indigo-400"
               onkeydown="movePrev(event, 'otp5')" required>
      </div>

      <!-- Hidden input to collect OTP -->
      <input type="hidden" name="otp" id="otp_hidden">

      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition">
        Verify OTP
      </button>
    </form>

    <p class="text-gray-600 mt-6">
      Didn't receive OTP? <a href="{{ url_for('login') }}" class="text-indigo-600 hover:underline">Resend</a>
    </p>
  </div>

</body>
</html>
