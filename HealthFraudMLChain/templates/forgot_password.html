<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-indigo-500 to-purple-600">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Forgot Password</h2>

    <form method="POST">
      <div class="mb-4">
        <label class="block font-semibold mb-1">Enter Your Email</label>
        <input type="email" name="email" required
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400">
      </div>
      <button type="submit"
        class="w-full py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700">
        Send OTP
      </button>
    </form>

    <p class="mt-4 text-center">
      <a href="{{ url_for('login') }}" class="text-indigo-500">Back to Login</a>
    </p>
  </div>
</body>
</html>
